services:
  jsmyadmin:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - data:/data
      - uploads:/uploads
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DATA_DIR=/data
      - UPLOAD_DIR=/uploads
    restart: unless-stopped

volumes:
  data:
  uploads: